<!doctype html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: 'SquadLatin-Black';
            src: url('bundle/squadbusters/fonts/SquadLatin-Black205e033ed037816028ab.otf');
        }

        body {
            background-color: #292c3c; /* That deep Squad blue */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'SquadLatin-Black', sans-serif;
        }

        .news-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            padding: 20px;
            width: 95%;
            max-width: 900px;
            overflow-x: auto; /* Allows scrolling if the screen is too small */
        }

        .card {
            flex: 1;
            min-width: 320px; /* Prevents the "squish" in your screenshot */
            background: #121212;
            border-radius: 25px;
            border: 3px solid #000;
            overflow: hidden;
            position: relative;
            transition: transform 0.1s;
            text-decoration: none;
        }

        .card:active { transform: scale(0.96); }

        .card-img { width: 100%; display: block; }

        .info-section { padding: 15px; }

        .label-news { color: #d9ef0c; font-size: 18px; text-transform: uppercase; }
        .label-date { color: #7c829c; font-size: 14px; margin-left: 10px; }
        .title { color: #ffffff; font-size: 24px; margin: 8px 0; display: block; }

        /* The Dots */
        .dots-container {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .dot { width: 12px; height: 12px; background: #333; border: 2px solid #000; border-radius: 50%; }
        .dot.active { background: #fff; }

        .arrow-btn {
            position: absolute;
            right: 15px;
            bottom: 15px;
            width: 35px;
        }
    </style>
</head>

<body>
    <div class="news-wrapper">
        
        <!-- LEFT CARD (Featured) -->
        <div class="card">
            <img src="Нов проект (1).jpg" class="card-img" onerror="this.src='bundle/squadbusters/images/paula_exclaim.avif'">
            <div class="dots-container">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- RIGHT CARD (News Link) -->
        <a href="https://reversedsquad1.github.io/WHT/Squad_Article/squadbusters.inbox.supercell.com/article.html" class="card">
            <img src="bundle/squadbusters/images/paula_exclaim.avif" class="card-img">
            <div class="info-section">
                <span class="label-news">News</span>
                <span class="label-date">1 May</span>
                <span class="title">OpenSquad News?!?!</span>
                <img src="bundle/squadbusters/images/09a85525caa35f93cfad.svg" class="arrow-btn">
            </div>
        </a>

    </div>
</body>
</html>
